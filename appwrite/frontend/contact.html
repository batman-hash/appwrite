<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERGHOST — CONTACT</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #e6e6e6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -10;
      opacity: 0.55;
      filter: brightness(0.45) saturate(1.06);
      pointer-events: none;
    }

    #bg-video::-webkit-media-controls {
      display: none !important;
    }

    #bg-video::-webkit-media-controls-panel,
    #bg-video::-webkit-media-controls-play-button,
    #bg-video::-webkit-media-controls-start-playback-button,
    #bg-video::-webkit-media-controls-fullscreen-button {
      display: none !important;
      -webkit-appearance: none;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(500px) rotateX(60deg) translateY(0);
      animation: gridMove 20s linear infinite;
      z-index: -9;
    }

    @keyframes gridMove {
      from { transform: perspective(500px) rotateX(60deg) translateY(0); }
      to { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: -8;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #0ff;
      border-radius: 50%;
      box-shadow: 0 0 10px #0ff, 0 0 20px #f0f;
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
      50% { transform: translateY(-100px) scale(1.5); opacity: 0.3; }
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      z-index: 1000;
    }

    nav a {
      color: #0ff;
      text-decoration: none;
      font-size: 0.9em;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      position: relative;
    }

    nav a:hover {
      color: #f0f;
      text-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
    }

    nav a.active {
      color: #f0f;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }

    nav a.active::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #f0f, #0ff);
      box-shadow: 0 0 10px #0ff;
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1.2em;
      background: linear-gradient(135deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-links {
      position: absolute;
      right: 25px;
      top: 15px;
      display: flex;
      gap: 10px;
    }

    .neon-btn {
      padding: 8px 20px;
      border: 1px solid #0ff;
      border-radius: 25px;
      background: transparent;
      color: #0ff;
      font-size: 0.75em;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .neon-btn:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .neon-btn.alt {
      border-color: #f0f;
      color: #f0f;
    }

    .neon-btn.alt:hover {
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
    }

    header {
      text-align: center;
      padding: 190px 20px 56px;
    }

    h1 {
      font-size: 3em;
      font-weight: 700;
      background: linear-gradient(135deg, #f0f 0%, #0ff 50%, #f0f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
      background-size: 200% 200%;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    header p {
      color: #888;
      font-size: 1em;
      letter-spacing: 4px;
      margin-top: 10px;
      text-transform: uppercase;
    }

    .contact-container {
      max-width: 100%;
      width: 100%;
      padding: 28px 20px 120px;
      display: flex;
      justify-content: center;
      perspective: 1200px;
    }

    .contact-stage {
      position: relative;
      display: grid;
      place-items: center;
      width: min(980px, 100%);
      min-height: 900px;
      border-radius: 28px;
      overflow: hidden;
      border: none;
      box-shadow: none;
      background: rgba(0, 0, 0, 0.2);
    }

    .contact-stage-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.48;
      filter: brightness(0.58) saturate(1.04);
      pointer-events: none;
    }

    .contact-stage::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(2, 6, 14, 0.18) 0%, rgba(2, 6, 14, 0.68) 100%),
        radial-gradient(circle at top right, rgba(255, 0, 255, 0.14), transparent 34%),
        radial-gradient(circle at bottom left, rgba(0, 255, 255, 0.12), transparent 36%);
      pointer-events: none;
    }

    .contact-form-wrapper {
      width: 100%;
      max-width: 640px;
      padding: 56px;
      background: linear-gradient(180deg, 
        rgba(20, 20, 35, 0.95) 0%, 
        rgba(10, 10, 20, 0.98) 100%);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 20px;
      position: relative;
      box-shadow: 
        0 0 50px rgba(0, 255, 255, 0.1),
        0 0 100px rgba(255, 0, 255, 0.05),
        inset 0 0 50px rgba(0, 255, 255, 0.05);
      transform-style: preserve-3d;
      transition: transform 0.2s ease, box-shadow 0.25s ease;
      z-index: 1;
    }

    .contact-form-wrapper.tilt-on {
      box-shadow:
        0 10px 60px rgba(0, 255, 255, 0.16),
        0 0 120px rgba(255, 0, 255, 0.08),
        inset 0 0 50px rgba(0, 255, 255, 0.06);
    }

    @keyframes vibrate {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .vibrate {
      animation: vibrate 0.5s ease-in-out;
      border-color: #f00 !important;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.5) !important;
    }

    .contact-form-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #0ff, #f0f, #0ff, transparent);
      filter: blur(6px);
      opacity: .7;
    }

    .corner-neon {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid transparent;
    }

    .corner-neon.top-left {
      top: 15px;
      left: 15px;
      border-top-color: #f0f;
      border-left-color: #f0f;
      box-shadow: -5px -5px 20px rgba(255, 0, 255, 0.3);
    }

    .corner-neon.top-right {
      top: 15px;
      right: 15px;
      border-top-color: #0ff;
      border-right-color: #0ff;
      box-shadow: 5px -5px 20px rgba(0, 255, 255, 0.3);
    }

    .corner-neon.bottom-left {
      bottom: 15px;
      left: 15px;
      border-bottom-color: #0ff;
      border-left-color: #0ff;
      box-shadow: -5px 5px 20px rgba(0, 255, 255, 0.3);
    }

    .corner-neon.bottom-right {
      bottom: 15px;
      right: 15px;
      border-bottom-color: #f0f;
      border-right-color: #f0f;
      box-shadow: 5px 5px 20px rgba(255, 0, 255, 0.3);
    }

    .contact-form-wrapper h2 {
      text-align: center;
      margin-bottom: 35px;
      font-size: 1.5em;
      background: linear-gradient(90deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }

    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    .form-group label {
      display: block;
      color: #0ff;
      font-size: 0.8em;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95em;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #f0f;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.05);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #555;
    }

    .form-group textarea {
      height: 180px;
      resize: none;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      margin-top: 10px;
      background: linear-gradient(135deg, #f0f, #0ff);
      border: none;
      border-radius: 12px;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1em;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:hover {
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 0 60px rgba(255, 0, 255, 0.3);
      transform: translateY(-2px);
    }

    .member-banner {
      display: none;
      background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 25px;
      text-align: center;
    }

    .member-banner.active {
      display: block;
    }

    .member-banner span {
      color: #0ff;
      font-size: 0.85em;
      letter-spacing: 1px;
    }

    .member-banner span strong {
      color: #f0f;
    }

    .not-member-msg {
      display: none;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
    }

    .not-member-msg.active {
      display: block;
    }

    .not-member-msg p {
      color: #f66;
      font-size: 0.9em;
      margin-bottom: 15px;
    }

    .not-member-msg button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #f0f, #0ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .not-member-msg button:hover {
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #0ff, transparent);
      opacity: 0.5;
      animation: scan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #333;
      font-size: 0.75em;
      letter-spacing: 2px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.4s;
      z-index: 2000;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .auth-window {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: #0a0a14;
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 15px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      color: #f0f;
      cursor: pointer;
      font-size: 1.2em;
    }

    .auth-form h2 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-form input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 10px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
    }

    .auth-form button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #f0f, #0ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      cursor: pointer;
    }

    .switch-text {
      font-size: 0.75em;
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .switch-text span {
      color: #f0f;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }
  
  /* === RESPONSIVE PATCH === */
  img, video, canvas {
    max-width: 100%;
    height: auto;
  }

  nav {
    flex-wrap: wrap;
  }

  @media (max-width: 1024px) {
    nav {
      gap: 14px !important;
      padding: 14px !important;
    }

    header {
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    .wrap,
    .container,
    .contact-container,
    .poster-grid-container,
    .chat-section,
    .auth-window,
    .player,
    .panel {
      width: min(100%, 980px) !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
  }

  @media (max-width: 768px) {
    html, body {
      font-size: 15px;
    }

    nav {
      justify-content: center !important;
      row-gap: 10px !important;
      column-gap: 10px !important;
      padding: 10px 8px !important;
    }

    nav a,
    nav button {
      font-size: 0.78rem !important;
      padding: 8px 10px !important;
    }

    header {
      margin-top: 82px !important;
      padding: 0 12px !important;
      text-align: center !important;
    }

    h1 {
      font-size: clamp(1.3rem, 6vw, 2rem) !important;
      line-height: 1.2;
    }

    h2 {
      font-size: clamp(1rem, 5vw, 1.5rem) !important;
    }

    .auth-window,
    .contact-stage,
    .contact-form-wrapper,
    .chat-section,
    .card,
    .player,
    .panel {
      width: calc(100% - 20px) !important;
      max-width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
      padding: 12px !important;
    }

    .poster-grid,
    .events-grid,
    .cards-grid,
    .topics-grid,
    .playlist-grid,
    .shop-grid,
    .panel {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    .chat-messages {
      height: 46vh !important;
      min-height: 260px;
      max-height: 58vh;
    }

    .chat-input-area,
    .row {
      flex-wrap: wrap !important;
    }

    .chat-input-area input,
    .chat-input-area button,
    input,
    select,
    textarea,
    button {
      width: 100%;
      max-width: 100%;
    }
  }

  @media (max-width: 420px) {
    html, body {
      font-size: 14px;
    }

    nav a,
    nav button {
      font-size: 0.72rem !important;
      letter-spacing: 0.04em !important;
    }

    .chat-messages {
      height: 44vh !important;
    }
  }
</style>
</head>

<body data-require-auth="true">

  <video
    id="bg-video"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    disablepictureinpicture
    controlslist="nodownload nofullscreen noplaybackrate"
  >
    <source src="assets/video/carvideo.mp4" type="video/mp4">
  </video>
  
  <div class="bg-grid"></div>
  <div class="bg-particles" id="particles"></div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="Posterwall.html">POSTERWALL</a>
    <a href="shop.html">SHOP</a>
    <a href="room.html">THE ROOM</a>
    <a href="contact.html">CONTACT</a>

    <div class="auth-links" id="authLinks">
      <button class="neon-btn" id="openLogin">LOGIN</button>
      <button class="neon-btn alt" id="openRegister">REGISTER</button>
    </div>

    <div class="auth-links hidden" id="userLinks">
      <span id="usernameLabel" style="color:#0ff;font-size:.7em;margin-right:10px;"></span>
      <button class="neon-btn alt" id="logoutBtn">LOGOUT</button>
    </div>
  </nav>

  <header>
    <h1>CONTACT ME</h1>
    <p>Get In Touch</p>
  </header>

  <div class="contact-container">
    <div class="contact-stage">
      <video class="contact-stage-video" autoplay muted loop playsinline>
        <source src="assets/video/carvideo.mp4" type="video/mp4">
      </video>

      <div class="contact-form-wrapper" id="contactFormWrapper">
        <div class="scan-line"></div>
        <div class="corner-neon top-left"></div>
        <div class="corner-neon top-right"></div>
        <div class="corner-neon bottom-left"></div>
        <div class="corner-neon bottom-right"></div>
        
        <h2>// SEND MESSAGE</h2>
        
        <div class="member-banner" id="memberBanner">
          <span>Logged in as: <strong id="memberName"></strong></span>
        </div>
        
        <div class="not-member-msg" id="notMemberMsg">
          <p>You must be a member to send messages!</p>
          <button id="goToRegister">REGISTER NOW</button>
        </div>
        
        <form id="contactForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="ENTER YOUR NAME">
          </div>

          <div class="form-group">
            <label>Send To Email</label>
            <input type="email" id="recipientEmail" placeholder="RECIPIENT EMAIL" required>
          </div>
          
          <div class="form-group">
            <label>Message</label>
            <textarea id="message" placeholder="TYPE YOUR MESSAGE..."></textarea>
          </div>
          
          <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>
      </div>
    </div>
  </div>

  <footer>2026 CYBERGHOST</footer>

  <div class="overlay" id="authOverlay">
    <div class="auth-window">
      <div class="close-btn" id="closeOverlay">✕</div>

      <form id="loginForm" class="auth-form" action="/login" method="POST" data-standard="true">
        <h2>LOGIN</h2>
        <input type="hidden" name="next" value="/contact.html">
        <input type="email" name="email" placeholder="EMAIL" required>
        <input type="password" name="password" placeholder="PASSWORD" required>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <button>ACCESS</button>
          <button type="button" id="toForgot" style="background:none;border:none;color:#0ff;cursor:pointer;font-size:.72em;letter-spacing:.08em;text-decoration:underline;padding:0;white-space:nowrap;">RESET PASSWORD</button>
        </div>
        <p class="switch-text">
          NEW? <span id="toRegister">REGISTER</span>
        </p>
      </form>

      <form id="registerForm" class="auth-form hidden" action="/register" method="POST" data-standard="true">
        <h2>REGISTER</h2>
        <input type="hidden" name="next" value="/contact.html">
        <input type="text" name="username" placeholder="USERNAME" required>
        <input type="email" name="email" placeholder="EMAIL" required>
        <input type="password" name="password" placeholder="PASSWORD" required>
        <button>CREATE</button>
        <p class="switch-text">
          ALREADY? <span id="toLogin">LOGIN</span>
        </p>
      </form>
      <form id="forgotForm" class="auth-form hidden" action="/request-reset" method="POST" data-standard="true">
        <h2>RESET PASSWORD</h2>
        <input type="hidden" name="next" value="/contact.html">
        <p style="font-size:0.7em;color:#888;margin-bottom:15px;text-align:center;">ENTER YOUR EMAIL TO REQUEST RESET</p>
        <input type="email" name="email" id="forgotEmail" placeholder="EMAIL" required>
        <button id="requestResetBtn">SEND REQUEST</button>
        <p class="switch-text">
          REMEMBERED? <span id="backToLogin">LOGIN</span>
        </p>
      </form>
    </div>
  </div>
<script src="js/auth.js"></script>

<script>

const API_BASE = `${window.location.origin}/api`;

let currentUser = null;


// =====================
// ELEMENTS
// =====================

const contactForm = document.getElementById("contactForm");
const contactFormWrapper = document.getElementById("contactFormWrapper");
const memberBanner = document.getElementById("memberBanner");
const notMemberMsg = document.getElementById("notMemberMsg");
const usernameInput = document.getElementById("username");
const memberName = document.getElementById("memberName");
const recipientEmailInput = document.getElementById("recipientEmail");

const overlay = document.getElementById("authOverlay");


// =====================
// PARTICLES
// =====================

const particlesContainer = document.getElementById("particles");

for (let i = 0; i < 30; i++) {

  const p = document.createElement("div");

  p.className = "particle";

  p.style.left = Math.random()*100+"%";
  p.style.top = Math.random()*100+"%";

  particlesContainer.appendChild(p);

}

// =====================
// 3D FORM TILT EFFECT
// =====================

function resetContactTilt() {
  contactFormWrapper.classList.remove("tilt-on");
  contactFormWrapper.style.transform = "rotateX(0deg) rotateY(0deg) translateZ(0)";
}

function isDesktopTiltEnabled() {
  return window.matchMedia("(min-width: 900px)").matches;
}

contactFormWrapper.addEventListener("mousemove", (e) => {
  if (!isDesktopTiltEnabled()) return;
  const rect = contactFormWrapper.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  const rotateX = (0.5 - y) * 9;
  const rotateY = (x - 0.5) * 11;

  contactFormWrapper.classList.add("tilt-on");
  contactFormWrapper.style.transform =
    `rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) translateZ(0)`;
});

contactFormWrapper.addEventListener("mouseleave", resetContactTilt);
window.addEventListener("resize", () => {
  if (!isDesktopTiltEnabled()) resetContactTilt();
});


// =====================
// SYNC USER UI
// =====================

function syncContactUser() {

  const stored =
    localStorage.getItem("user");

  if (!stored) {

    memberBanner.classList.remove("active");
    notMemberMsg.classList.add("active");

    usernameInput.value="";
    usernameInput.disabled=true;

    return;

  }

  const user = JSON.parse(stored);

  currentUser=user;

  memberBanner.classList.add("active");
  notMemberMsg.classList.remove("active");

  usernameInput.value=user.username;
  usernameInput.disabled=true;

  memberName.textContent =
    user.username.toUpperCase();

}


// =====================
// CONTACT FORM
// =====================

contactForm.addEventListener("submit", async e => {

  e.preventDefault();

  if (!currentUser) {

    contactFormWrapper.classList.add("vibrate");

    setTimeout(()=>contactFormWrapper.classList.remove("vibrate"),500);

    return;

  }

  const message =
    document.getElementById("message").value;
  const recipientEmail =
    recipientEmailInput.value.trim().toLowerCase();

  if (!message || !recipientEmail) {

    alert("ENTER MESSAGE AND RECIPIENT EMAIL");

    return;

  }

  try {

    const res =
      await fetch(`${API_BASE}/contact`,{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          username:currentUser.username,
          email:currentUser.email,
          message:message,
          recipient_email:recipientEmail

        })

      });

    const data=await res.json();

    if(!data.success)
      throw new Error(data.error);

    if (data.email_sent) {
      alert("MESSAGE SAVED AND EMAIL SENT");
    } else {
      alert("MESSAGE SAVED, BUT EMAIL NOT SENT (CHECK SMTP SETTINGS)");
    }

    document.getElementById("message").value="";

  }

  catch(err){

    alert(err.message);

  }

});


// =====================
// INIT AUTH (ONLY ONCE)
// =====================

// sync UI
syncContactUser();

</script>
</body>
</html>
