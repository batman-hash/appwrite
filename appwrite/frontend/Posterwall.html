<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERGHOST — POSTERWALL</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap');

    /* ===== BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #e6e6e6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND VIDEO ===== */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.92;
      filter: brightness(0.82) saturate(1.02);
      pointer-events: none;
      transform: perspective(1200px) rotateX(2.2deg) scale(1.06);
      transform-origin: center center;
      animation: bgVideoDrift 18s ease-in-out infinite alternate;
    }

    @keyframes bgVideoDrift {
      from {
        transform: perspective(1200px) rotateX(2.2deg) translate3d(-1.2%, -0.8%, 0) scale(1.06);
      }
      to {
        transform: perspective(1200px) rotateX(2.2deg) translate3d(1.2%, 0.8%, 0) scale(1.08);
      }
    }

    .space-depth {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.12;
      pointer-events: none;
      overflow: hidden;
      perspective: 1200px;
    }

    body > *:not(#bg-video):not(.space-depth) {
      position: relative;
      z-index: 2;
    }

    .space-nebula {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 18% 24%, rgba(0, 255, 255, 0.12) 0 18%, transparent 38%),
        radial-gradient(circle at 80% 32%, rgba(156, 39, 176, 0.14) 0 22%, transparent 40%),
        radial-gradient(circle at 56% 72%, rgba(30, 140, 255, 0.12) 0 18%, transparent 36%),
        radial-gradient(circle at 42% 50%, rgba(255, 0, 255, 0.08) 0 26%, transparent 45%);
      filter: blur(26px) saturate(125%);
      opacity: 0.35;
      animation: nebulaShift 38s ease-in-out infinite alternate;
      transform: translate3d(calc(var(--mx, 0) * -8px), calc(var(--my, 0) * -8px), 0);
    }

    .star-layer {
      position: absolute;
      inset: -25%;
      background-repeat: repeat;
      opacity: 0.22;
      transform-style: preserve-3d;
    }

    .star-back {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255, 255, 255, 0.6), transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(0, 255, 255, 0.7), transparent),
        radial-gradient(1px 1px at 220px 190px, rgba(255, 255, 255, 0.6), transparent),
        radial-gradient(1px 1px at 340px 60px, rgba(255, 0, 255, 0.6), transparent);
      background-size: 380px 240px;
      animation: starDriftBack 95s linear infinite;
      transform: translate3d(calc(var(--mx, 0) * -10px), calc(var(--my, 0) * -10px), -260px);
    }

    .star-mid {
      background-image:
        radial-gradient(1.4px 1.4px at 40px 50px, rgba(255, 255, 255, 0.9), transparent),
        radial-gradient(1.4px 1.4px at 180px 120px, rgba(0, 255, 255, 0.9), transparent),
        radial-gradient(1.2px 1.2px at 300px 70px, rgba(255, 0, 255, 0.8), transparent),
        radial-gradient(1.4px 1.4px at 360px 200px, rgba(255, 255, 255, 0.8), transparent);
      background-size: 420px 280px;
      animation: starDriftMid 65s linear infinite;
      transform: translate3d(calc(var(--mx, 0) * -22px), calc(var(--my, 0) * -22px), -140px);
    }

    .star-front {
      background-image:
        radial-gradient(1.8px 1.8px at 60px 100px, rgba(255, 255, 255, 1), transparent),
        radial-gradient(1.8px 1.8px at 210px 30px, rgba(0, 255, 255, 1), transparent),
        radial-gradient(1.8px 1.8px at 320px 140px, rgba(255, 0, 255, 1), transparent),
        radial-gradient(2px 2px at 430px 220px, rgba(255, 255, 255, 0.9), transparent);
      background-size: 500px 320px;
      animation: starDriftFront 38s linear infinite;
      transform: translate3d(calc(var(--mx, 0) * -36px), calc(var(--my, 0) * -36px), -20px);
      filter: drop-shadow(0 0 4px rgba(0, 255, 255, 0.4));
    }

    /* ===== NAV ===== */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      z-index: 1000;
    }

    nav a {
      color: #0ff;
      text-decoration: none;
      font-size: 0.9em;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    nav a:hover {
      color: #f0f;
      text-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
    }

    nav a.active {
      color: #f0f;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 1.2em;
      background: linear-gradient(135deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-links {
      position: absolute;
      right: 25px;
      top: 15px;
      display: flex;
      gap: 10px;
    }

    .neon-btn {
      padding: 8px 20px;
      border: 1px solid #0ff;
      border-radius: 25px;
      background: transparent;
      color: #0ff;
      font-size: 0.75em;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .neon-btn:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .neon-btn.alt {
      border-color: #f0f;
      color: #f0f;
    }

    .neon-btn.alt:hover {
      background: rgba(255, 0, 255, 0.1);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 120px 20px 40px;
    }

    h1 {
      font-size: 2.5em;
      font-weight: 700;
      background: linear-gradient(135deg, #f0f 0%, #0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #888;
      font-size: 0.9em;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* ===== POSTER GRID CONTAINER ===== */
    .poster-grid-container {
      width: 100%;
      max-width: 100%;
      padding: 0 20px 100px;
    }

    /* ===== VINYL POSTER GRID ===== */
    .poster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      column-gap: 48px;
      row-gap: 56px;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Vinyl record style poster */
    .vinyl-poster {
      position: relative;
      aspect-ratio: 1 / 1;
      background: linear-gradient(145deg, #0a0a14, #1a1a2e);
      border-radius: 50%;
      border: 8px solid #0a0a14;
      box-shadow: 
        0 0 0 3px rgba(0, 255, 255, 0.2),
        0 0 40px rgba(0, 255, 255, 0.1);
      overflow: hidden;
      transition: all 0.5s ease;
      cursor: pointer;
      will-change: transform;
    }

    .vinyl-poster::before {
      content: '';
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      width: 40%;
      height: 40%;
      background: linear-gradient(145deg, #0a0a14, #1a1a2e);
      border-radius: 50%;
      border: 3px solid rgba(0, 255, 255, 0.3);
      z-index: 2;
    }

    /* Vinyl grooves */
    .vinyl-poster::after {
      content: '';
      position: absolute;
      inset: 15%;
      background: repeating-radial-gradient(
        circle at center,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.03) 2px,
        rgba(255, 255, 255, 0.03) 4px
      );
      border-radius: 50%;
    }

    .vinyl-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      transition: all 0.5s ease;
    }

    .vinyl-poster:hover {
      transform: scale(1.05) rotate(5deg);
      box-shadow: 
        0 0 0 3px rgba(255, 0, 255, 0.5),
        0 0 60px rgba(255, 0, 255, 0.3);
    }

    .vinyl-poster:hover img {
      filter: brightness(1.1) saturate(1.2);
    }

    /* Label in center of vinyl */
    .vinyl-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30%;
      height: 30%;
      background: linear-gradient(135deg, #f0f, #0ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    .vinyl-label span {
      color: #000;
      font-size: 0.6em;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
    }

    /* Square poster option */
    .square-poster {
      aspect-ratio: 2 / 3;
      background: linear-gradient(145deg, #0a0a14, #1a1a2e);
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
      transition: all 0.5s ease;
      cursor: pointer;
    }

    .square-poster:hover {
      transform: translateY(-10px);
      box-shadow: 
        0 0 0 2px rgba(255, 0, 255, 0.5),
        0 10px 40px rgba(255, 0, 255, 0.2);
    }

    .square-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.5s ease;
    }

    .square-poster:hover img {
      filter: brightness(1.1) saturate(1.2);
    }

    /* Grid for sleeve images */
    .sleeve-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 20px 100px;
    }

    .sleeve-item {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
      transition: all 0.5s ease;
    }

    .sleeve-item:hover {
      transform: scale(1.03);
      border-color: #f0f;
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
    }

    .sleeve-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 40px;
      color: #333;
      font-size: 0.75em;
      letter-spacing: 2px;
    }

    #infiniteSentinel {
      width: 100%;
      height: 8px;
      margin-top: 36px;
    }

    .load-hint {
      text-align: center;
      color: #5c6a73;
      font-size: 0.72em;
      letter-spacing: 0.18em;
      margin-top: 14px;
    }

    @keyframes starDriftBack {
      from { transform: translate3d(calc(var(--mx, 0) * -10px), calc(var(--my, 0) * -10px), -260px) translateY(0); }
      to { transform: translate3d(calc(var(--mx, 0) * -10px), calc(var(--my, 0) * -10px), -260px) translateY(260px); }
    }

    @keyframes starDriftMid {
      from { transform: translate3d(calc(var(--mx, 0) * -22px), calc(var(--my, 0) * -22px), -140px) translateY(0); }
      to { transform: translate3d(calc(var(--mx, 0) * -22px), calc(var(--my, 0) * -22px), -140px) translateY(300px); }
    }

    @keyframes starDriftFront {
      from { transform: translate3d(calc(var(--mx, 0) * -36px), calc(var(--my, 0) * -36px), -20px) translateY(0); }
      to { transform: translate3d(calc(var(--mx, 0) * -36px), calc(var(--my, 0) * -36px), -20px) translateY(360px); }
    }

    @keyframes nebulaShift {
      from { transform: translate3d(calc(var(--mx, 0) * -8px), calc(var(--my, 0) * -8px), 0) scale(1); }
      to { transform: translate3d(calc(var(--mx, 0) * -8px), calc(var(--my, 0) * -8px), 0) scale(1.08); }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body data-require-auth="true">

  <!-- BACKGROUND -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="assets/video/pianoclassic.mp4" type="video/mp4">
  </video>
  <div class="space-depth" aria-hidden="true">
    <div class="space-nebula"></div>
    <div class="star-layer star-back"></div>
    <div class="star-layer star-mid"></div>
    <div class="star-layer star-front"></div>
  </div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="Posterwall.html">POSTERWALL</a>
    <a href="shop.html">SHOP</a>
    <a href="room.html">THE ROOM</a>
    <a href="contact.html">CONTACT</a>

    <select id="langSelect" title="Language" style="position:absolute;left:15px;top:18px;padding:6px;border-radius:6px;background:transparent;color:#0ff;border:1px solid rgba(0,255,255,0.15)">
      <option value="en">EN</option>
      <option value="it">IT</option>
      <option value="es">ES</option>
    </select>

    <div class="auth-links" id="authLinks">
      <button class="neon-btn" id="openLogin">LOGIN</button>
      <button class="neon-btn alt" id="openRegister">REGISTER</button>
    </div>

    <div class="auth-links hidden" id="userLinks">
      <span id="usernameLabel" style="color:#0ff;font-size:.7em;margin-right:10px;"></span>
      <button class="neon-btn alt" id="logoutBtn">LOGOUT</button>
    </div>
  </nav>

  <header>
    <h1>POSTERWALL</h1>
    <p>Vinyl Collection</p>
  </header>

  <div class="poster-grid-container">
    <!-- Vinyl Posters -->
    <div class="poster-grid">
      <div class="vinyl-poster">
        <img src="assets/images/sleeve1.jpg" alt="Sleeve 1">
        <div class="vinyl-label"><span>CG<br>01</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve2.jpg" alt="Sleeve 2">
        <div class="vinyl-label"><span>CG<br>02</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve3.jpg" alt="Sleeve 3">
        <div class="vinyl-label"><span>CG<br>03</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve1.jpg" alt="Sleeve 4">
        <div class="vinyl-label"><span>CG<br>04</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve2.jpg" alt="Sleeve 5">
        <div class="vinyl-label"><span>CG<br>05</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve3.jpg" alt="Sleeve 6">
        <div class="vinyl-label"><span>CG<br>06</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve1.jpg" alt="Sleeve 7">
        <div class="vinyl-label"><span>CG<br>07</span></div>
      </div>
      <div class="vinyl-poster">
        <img src="assets/images/sleeve2.jpg" alt="Sleeve 8">
        <div class="vinyl-label"><span>CG<br>08</span></div>
      </div>
    </div>
    <div class="load-hint">SCROLL DEEPER // SLEEVES STREAM INFINITE</div>
    <div id="infiniteSentinel" aria-hidden="true"></div>
  </div>
  <footer>2026 CYBERGHOST</footer>
 <script src="js/auth.js"></script>
  <script>
    const grid = document.querySelector('.poster-grid');
    const sleeveSources = [
      'assets/images/sleeve1.jpg',
      'assets/images/sleeve2.jpg',
      'assets/images/sleeve3.jpg'
    ];
    let sleeveCount = document.querySelectorAll('.poster-grid .vinyl-poster').length;
    let appendInProgress = false;

    function createSleevePoster(src, labelText) {
      const poster = document.createElement('div');
      poster.className = 'vinyl-poster';
      const hue = Math.floor(Math.random() * 40) - 20;
      poster.style.filter = `hue-rotate(${hue}deg)`;
      poster.innerHTML = `
        <img src="${src}" alt="Sleeve ${labelText}">
        <div class="vinyl-label"><span>${labelText}</span></div>
      `;
      return poster;
    }

    function appendSleeveBatch(batchSize) {
      if (appendInProgress) return;
      appendInProgress = true;
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < batchSize; i += 1) {
        sleeveCount += 1;
        const source = sleeveSources[Math.floor(Math.random() * sleeveSources.length)];
        const label = `CG<br>${String(sleeveCount).padStart(2, '0')}`;
        fragment.appendChild(createSleevePoster(source, label));
      }

      grid.appendChild(fragment);
      appendInProgress = false;
    }

    // Keep generating sleeves as user approaches the footer area.
    const sentinel = document.getElementById('infiniteSentinel');
    const infiniteObserver = new IntersectionObserver((entries) => {
      if (!entries[0] || !entries[0].isIntersecting) return;
      appendSleeveBatch(12);
    }, { root: null, rootMargin: '900px 0px 1200px 0px', threshold: 0 });
    infiniteObserver.observe(sentinel);

    // Slight mouse parallax to increase depth.
    window.addEventListener('mousemove', (e) => {
      const mx = (e.clientX / window.innerWidth - 0.5) * 2;
      const my = (e.clientY / window.innerHeight - 0.5) * 2;
      document.documentElement.style.setProperty('--mx', mx.toFixed(3));
      document.documentElement.style.setProperty('--my', my.toFixed(3));
    });
</script>
</body>
</html>
