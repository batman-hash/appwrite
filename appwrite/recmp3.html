<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Stereo System Audio Recorder</title>

<style>
  body { font-family: sans-serif; padding: 20px; max-width: 700px; }
  button { margin: 5px 5px 5px 0; }
  #timer { font-size: 18px; margin: 10px 0; font-weight: bold; }
  .row { margin: 10px 0; }
</style>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
</head>

<body>

<h2>Windows Stereo System Audio Recorder</h2>

<div class="row">
  <button id="start">Start Recording</button>
  <button id="stop" disabled>Stop</button>
</div>

<div id="timer">00:00</div>

<div class="row">
  <label>
    Master Volume
    <input type="range" id="volume" min="0" max="2" step="0.01" value="1">
  </label>
</div>

<div class="row">
  <audio id="player" controls></audio>
</div>

<div class="row">
  <a id="downloadWebm" download disabled>Download WebM</a>
  <button id="downloadMp3" disabled>Download MP3</button>
</div>

<script>
/* ---------- STATE ---------- */
let mediaRecorder;
let audioChunks = [];
let recordedBlob = null;
let timerInterval = null;
let seconds = 0;
let captureStream = null;

/* ---------- FFmpeg ---------- */
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: false });

/* ---------- AUDIO GRAPH (STEREO) ---------- */
const audioContext = new AudioContext({ sampleRate: 48000 });
const gainNode = audioContext.createGain();
const destination = audioContext.createMediaStreamDestination();

gainNode.channelCount = 2;
gainNode.channelCountMode = "explicit";
gainNode.channelInterpretation = "speakers";
gainNode.connect(destination);

/* ---------- UI ELEMENTS ---------- */
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const timerEl = document.getElementById("timer");
const player = document.getElementById("player");
const downloadWebm = document.getElementById("downloadWebm");
const downloadMp3 = document.getElementById("downloadMp3");
const volumeSlider = document.getElementById("volume");

volumeSlider.oninput = e => gainNode.gain.value = e.target.value;

/* ---------- TIMER ---------- */
function startTimer() {
  seconds = 0;
  timerEl.textContent = "00:00";

  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, "0");
    const s = String(seconds % 60).padStart(2, "0");
    timerEl.textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

/* ---------- HELPERS ---------- */
function resetUIForRecording() {
  startBtn.disabled = true;
  stopBtn.disabled = false;
  downloadWebm.disabled = true;
  downloadMp3.disabled = true;
}

function resetUIAfterStop() {
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

/* ---------- START RECORDING ---------- */
startBtn.onclick = async () => {
  if (audioContext.state === "suspended") {
    await audioContext.resume();
  }

  try {
    captureStream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true
    });
  } catch (err) {
    alert("Screen capture was blocked or canceled.");
    return;
  }

  if (!captureStream.getAudioTracks().length) {
    alert("No system audio detected. Enable 'Share system audio'.");
    captureStream.getTracks().forEach(t => t.stop());
    return;
  }

  captureStream.oninactive = () => {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
      stopTimer();
      resetUIAfterStop();
    }
  };

  // Kill video track immediately — we only want audio
  captureStream.getVideoTracks().forEach(t => t.stop());

  // Pipe system audio into our stereo graph
  const source = audioContext.createMediaStreamSource(captureStream);
  source.channelCount = 2;
  source.channelCountMode = "explicit";
  source.channelInterpretation = "speakers";
  source.connect(gainNode);

  const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
    ? "audio/webm;codecs=opus"
    : "audio/webm";

  mediaRecorder = new MediaRecorder(destination.stream, {
    mimeType: mime,
    audioBitsPerSecond: 192000
  });

  audioChunks = [];

  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(audioChunks, { type: mime });
    const url = URL.createObjectURL(recordedBlob);
    player.src = url;

    const ts = new Date().toISOString().replace(/[:.]/g, "-");
    downloadWebm.href = url;
    downloadWebm.download = `system-audio-${ts}.webm`;
    downloadWebm.disabled = false;
    downloadMp3.disabled = false;
  };

  try {
    mediaRecorder.start();
  } catch (err) {
    alert("Recording failed to start.");
    captureStream.getTracks().forEach(t => t.stop());
    return;
  }
  startTimer();
  resetUIForRecording();
};

/* ---------- STOP RECORDING ---------- */
stopBtn.onclick = () => {
  mediaRecorder.stop();
  stopTimer();

  if (captureStream) {
    captureStream.getTracks().forEach(t => t.stop());
  }

  resetUIAfterStop();
};

/* ---------- CONVERT TO MP3 ---------- */
downloadMp3.onclick = async () => {
  downloadMp3.textContent = "Converting…";
  downloadMp3.disabled = true;

  if (!ffmpeg.isLoaded()) {
    await ffmpeg.load();
  }

  ffmpeg.FS("writeFile", "input.webm", await fetchFile(recordedBlob));

  await ffmpeg.run(
    "-i", "input.webm",
    "-ac", "2",
    "-ar", "44100",
    "-b:a", "192k",
    "output.mp3"
  );

  const mp3Data = ffmpeg.FS("readFile", "output.mp3");
  const mp3Blob = new Blob([mp3Data.buffer], { type: "audio/mpeg" });
  const mp3Url = URL.createObjectURL(mp3Blob);

  const a = document.createElement("a");
  a.href = mp3Url;
  a.download = "system-audio.mp3";
  a.click();

  downloadMp3.textContent = "Download MP3";
  downloadMp3.disabled = false;
};
</script>

</body>
</html>
