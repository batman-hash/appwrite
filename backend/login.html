<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERGHOST — Track Transmission</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #05000a, #000);
      color: #e6e6e6;
      min-height: 100vh;
    }

    /* ================= NAV ================= */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      padding: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 30px;
      border-bottom: 1px solid #0ff3;
    }

    nav a {
      color: #0ff;
      text-decoration: none;
      font-size: 0.9em;
      text-shadow: 0 0 5px #0ff;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f0f;
      text-shadow: 0 0 10px #f0f;
    }

    /* ================= HEADER ================= */
    header {
      text-align: center;
      padding: 140px 20px 40px;
    }

    h1 {
      font-size: 3.5em;
      background: linear-gradient(90deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.8em;
      color: #888;
      margin-top: 10px;
    }

    /* ================= TRACKLIST ================= */
    .track-container {
      max-width: 700px;
      margin: 40px auto 100px;
      padding: 30px;
      background: rgba(15,15,25,0.7);
      border: 1px solid #0ff4;
      border-radius: 20px;
      box-shadow: 0 0 40px #0ff2;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 10px;
      border-bottom: 1px solid #0ff2;
      transition: 0.3s;
    }

    .track:last-child {
      border-bottom: none;
    }

    .track:hover {
      background: rgba(0,255,255,0.05);
    }

    .track-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .track-title {
      font-size: 0.9em;
      color: #0ff;
    }

    .track-sub {
      font-size: 0.65em;
      color: #777;
    }

    .track button {
      background: transparent;
      border: 1px solid #f0f;
      color: #f0f;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.65em;
      cursor: pointer;
      transition: 0.3s;
    }

    .track button:hover {
      background: #f0f;
      color: #000;
      box-shadow: 0 0 15px #f0f;
    }

    /* ================= PLAYER ================= */
    .player {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #0ff3;
      text-align: center;
    }

    .now-playing {
      font-size: 0.7em;
      color: #0ff;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    audio {
      width: 100%;
      filter: hue-rotate(150deg) brightness(1.5);
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #444;
      font-size: 0.7em;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="track.html">Tracks</a>
  <a href="contact.html">Contact</a>
</nav>

<header>
  <h1>TRACK TRANSMISSION</h1>
  <p>Post-Romantic Circuits — Signal Archive</p>
</header>

<section class="track-container">

  <div class="track">
    <div class="track-info">
      <div class="track-title">01 — Neon Afterimage</div>
      <div class="track-sub">4:12 // SYNTH WAVEFORM</div>
    </div>
    <button onclick="playTrack('assets/audio/track1.mp3', 'Neon Afterimage')">PLAY</button>
  </div>

  <div class="track">
    <div class="track-info">
      <div class="track-title">02 — Ghosts in the Circuit</div>
      <div class="track-sub">3:48 // MEMORY LOOP</div>
    </div>
    <button onclick="playTrack('assets/audio/track2.mp3', 'Ghosts in the Circuit')">PLAY</button>
  </div>

  <div class="track">
    <div class="track-info">
      <div class="track-title">03 — Post-Romantic Error</div>
      <div class="track-sub">5:01 // EMOTIONAL OVERFLOW</div>
    </div>
    <button onclick="playTrack('assets/audio/track3.mp3', 'Post-Romantic Error')">PLAY</button>
  </div>

  <div class="player">
    <div class="now-playing" id="nowPlaying">NO SIGNAL SELECTED</div>
    <audio id="audioPlayer" controls></audio>
  </div>

</section>

<footer>
  © 2026 CYBERGHOST // SIGNAL CONTINUES
</footer>

<script>
  const audioPlayer = document.getElementById('audioPlayer');
  const nowPlaying = document.getElementById('nowPlaying');

  function playTrack(src, title) {
    audioPlayer.src = src;
    audioPlayer.play();
    nowPlaying.textContent = 'NOW PLAYING: ' + title;
  }
</script>

</body>
</html>
