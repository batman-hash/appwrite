<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Audio Recorder</title>
<style>
  body {
    font-family: system-ui;
    background:#0f0f14;
    color:#eaeaf0;
    text-align:center;
    padding:20px;
  }
  button { padding:10px 16px; margin:10px; }
  .time { font-size:20px; margin:10px; }
  .panel {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:15px;
    margin:20px auto;
    max-width:900px;
  }
  .control {
    background:#1a1a22;
    padding:12px;
    border-radius:8px;
  }
  .clip-panel {
    max-width:900px;
    margin:18px auto 0;
    padding:16px;
    background:#171b22;
    border-radius:10px;
    text-align:left;
  }
  .clip-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:12px;
    align-items:end;
  }
  .clip-grid input {
    width:100%;
    box-sizing:border-box;
    padding:10px;
    border-radius:8px;
    border:1px solid #2f3642;
    background:#0f1319;
    color:#eaeaf0;
  }
  .clip-meta {
    margin-top:10px;
    font-size:13px;
    color:#aeb6c2;
  }
  .actions {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:10px 0 18px;
  }
  .player-wrap {
    max-width:900px;
    margin:18px auto 0;
    padding:16px;
    background:#171b22;
    border-radius:10px;
  }
  #previewPlayer {
    width:100%;
    margin-top:10px;
  }
  #status {
    font-size:14px;
    color:#aeb6c2;
    min-height:20px;
    margin-top:8px;
  }
  .hint-link {
    color:#7cc8ff;
    text-decoration:none;
    border-bottom:1px solid rgba(124,200,255,0.35);
  }
  .hint-link:hover {
    color:#b6e1ff;
    border-bottom-color:rgba(182,225,255,0.7);
  }
  label { display:block; font-size:14px; margin-bottom:6px; }
  input[type=range] { width:100%; }

  /* === RESPONSIVE PATCH === */
  img, video, canvas {
    max-width: 100%;
    height: auto;
  }

  nav {
    flex-wrap: wrap;
  }

  @media (max-width: 1024px) {
    nav {
      gap: 14px !important;
      padding: 14px !important;
    }

    header {
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    .wrap,
    .container,
    .contact-container,
    .poster-grid-container,
    .chat-section,
    .auth-window,
    .player,
    .panel {
      width: min(100%, 980px) !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
  }

  @media (max-width: 768px) {
    html, body {
      font-size: 15px;
    }

    nav {
      justify-content: center !important;
      row-gap: 10px !important;
      column-gap: 10px !important;
      padding: 10px 8px !important;
    }

    nav a,
    nav button {
      font-size: 0.78rem !important;
      padding: 8px 10px !important;
    }

    header {
      margin-top: 82px !important;
      padding: 0 12px !important;
      text-align: center !important;
    }

    h1 {
      font-size: clamp(1.3rem, 6vw, 2rem) !important;
      line-height: 1.2;
    }

    h2 {
      font-size: clamp(1rem, 5vw, 1.5rem) !important;
    }

    .auth-window,
    .contact-form-wrapper,
    .chat-section,
    .card,
    .player,
    .panel {
      width: calc(100% - 20px) !important;
      max-width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
      padding: 12px !important;
    }

    .poster-grid,
    .events-grid,
    .cards-grid,
    .topics-grid,
    .playlist-grid,
    .shop-grid,
    .panel {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    .chat-messages {
      height: 46vh !important;
      min-height: 260px;
      max-height: 58vh;
    }

    .chat-input-area,
    .row {
      flex-wrap: wrap !important;
    }

    .chat-input-area input,
    .chat-input-area button,
    input,
    select,

      width: 100%;

    }
  }

  @media (max-width: 420px) {
    html, body {
      font-size: 14px;
    }

    nav a,
    nav button {

      letter-spacing: 0.04em !important;
    }

    .chat-messages {
      height: 44vh !important;
    }
  }
</style>
</head>
<body>

<h2>🎧 System Audio Recorder</h2>

<div class="time" id="time">00:00</div>

<div class="actions">
  <button id="start">Start Recording</button>
  <button id="stop" disabled>Stop Recording</button>
  <button id="downloadWav" disabled>Download WAV</button>
  <button id="downloadMp3" disabled>Export MP3 320</button>
</div>

<div class="clip-panel">
  <div class="clip-grid">
    <div>
      <label for="clipStart">Clip Start (seconds)</label>
      <input id="clipStart" type="number" min="0" step="0.01" value="0" disabled>
    </div>
    <div>
      <label for="clipEnd">Clip End (seconds)</label>
      <input id="clipEnd" type="number" min="0" step="0.01" value="0" disabled>
    </div>
    <div>
      <button id="applyClip" disabled>Apply Clip Cut</button>
    </div>
  </div>
  <div class="clip-meta" id="clipMeta">Record audio first to enable clip cutting.</div>
</div>

<div class="player-wrap">
  <div>Preview after stop</div>
  <audio id="previewPlayer" controls preload="metadata"></audio>
  <div id="status"></div>
</div>

<div class="panel">

  <div class="control">
    <label>Low EQ (Bass)</label>
    <input id="lowGain" type="range" min="-12" max="12" step="0.1" value="3">
  </div>

  <div class="control">
    <label>Mid EQ</label>
    <input id="midGain" type="range" min="-12" max="12" step="0.1" value="2">
  </div>

  <div class="control">
    <label>High EQ (Treble)</label>
    <input id="highGain" type="range" min="-12" max="12" step="0.1" value="3">
  </div>

  <div class="control">
    <label>Compressor Threshold</label>
    <input id="threshold" type="range" min="-60" max="0" step="1" value="-18">
  </div>

  <div class="control">
    <label>Compressor Ratio</label>
    <input id="ratio" type="range" min="1" max="20" step="0.1" value="4">
  </div>

  <div class="control">
    <label>Attack</label>
    <input id="attack" type="range" min="0" max="0.1" step="0.001" value="0.005">
  </div>

  <div class="control">
    <label>Release</label>
    <input id="release" type="range" min="0.05" max="1" step="0.01" value="0.25">
  </div>

</div>

<script src="vendor/ffmpeg/ffmpeg.min.js"></script>
<script>
let mediaRecorder, audioChunks = [];
let startTime, timerInterval;
let audioCtx, compressor, lowEQ, midEQ, highEQ;
let displayStream;
let lastWavBlob = null;
let previewUrl = null;
let ffmpegInstance = null;
let ffmpegLoadPromise = null;
let ffmpegReady = false;
let recordedBuffer = null;
const appBase = `${window.location.origin}/`;

const timeEl = document.getElementById("time");
const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const downloadWavBtn = document.getElementById("downloadWav");
const downloadMp3Btn = document.getElementById("downloadMp3");
const clipStartInput = document.getElementById("clipStart");
const clipEndInput = document.getElementById("clipEnd");
const applyClipBtn = document.getElementById("applyClip");
const clipMetaEl = document.getElementById("clipMeta");
const previewPlayer = document.getElementById("previewPlayer");
const statusEl = document.getElementById("status");

function resetRecordingUi() {
  clearInterval(timerInterval);
  stopBtn.disabled = true;
  startBtn.disabled = false;
}

function stopCapturedStream() {
  if (!displayStream) return;
  displayStream.getTracks().forEach(track => track.stop());
  displayStream = null;
}

function getRecorderMimeType() {
  if (typeof MediaRecorder === "undefined") {
    return null;
  }
  const mimeTypes = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4",
    ""
  ];
  return mimeTypes.find((type) => !type || MediaRecorder.isTypeSupported(type)) || "";
}

function setStatus(text) {
  statusEl.textContent = text || "";
}

function setStatusHtml(html) {
  statusEl.innerHTML = html || "";
}

function getBlockedReasons() {
  const reasons = [];
  if (!window.isSecureContext) reasons.push("secure context missing");
  if (!navigator.mediaDevices) reasons.push("mediaDevices unavailable");
  if (!navigator.mediaDevices?.getDisplayMedia) reasons.push("screen capture unavailable");
  if (!navigator.mediaDevices?.getUserMedia) reasons.push("microphone capture unavailable");
  if (typeof MediaRecorder === "undefined") reasons.push("MediaRecorder unavailable");
  return reasons;
}

function getHostedPageUrl() {
  const path = location.pathname.split("/").pop() || "";
  return appBase + encodeURI(path);
}

function showBlockedStartMessage() {
  const pageUrl = getHostedPageUrl();
  const reasons = getBlockedReasons();
  const reasonText = reasons.length ? ` Missing: ${reasons.join(", ")}.` : "";
  setStatusHtml(
    `Start is blocked because screen/system audio capture needs the page opened from <a class="hint-link" href="${pageUrl}" target="_blank" rel="noopener">${pageUrl}</a> and a supported browser permission prompt.${reasonText}`
  );
}

function setIdleDownloads() {
  downloadWavBtn.disabled = !lastWavBlob;
  downloadMp3Btn.disabled = !lastWavBlob || !ffmpegReady;
}

function setClipControlsEnabled(enabled) {
  clipStartInput.disabled = !enabled;
  clipEndInput.disabled = !enabled;
  applyClipBtn.disabled = !enabled;
}

function updateClipMeta(duration) {
  if (!duration) {
    clipMetaEl.textContent = "Record audio first to enable clip cutting.";
    return;
  }
  clipMetaEl.textContent = `Recorded length: ${duration.toFixed(2)}s. Set start/end and apply clip cut before exporting.`;
}

function syncClipInputs(duration) {
  clipStartInput.value = "0";
  clipEndInput.value = duration.toFixed(2);
  clipStartInput.max = duration.toFixed(2);
  clipEndInput.max = duration.toFixed(2);
  updateClipMeta(duration);
}

function buildAudioBufferFromChannels(channels, sampleRate) {
  const length = channels[0].length;
  const context = new OfflineAudioContext(channels.length, length, sampleRate);
  const buffer = context.createBuffer(channels.length, length, sampleRate);
  channels.forEach((channelData, index) => buffer.copyToChannel(channelData, index));
  return buffer;
}

function createTrimmedBuffer(buffer, startSeconds, endSeconds) {
  const sampleRate = buffer.sampleRate;
  const startSample = Math.max(0, Math.floor(startSeconds * sampleRate));
  const endSample = Math.min(buffer.length, Math.floor(endSeconds * sampleRate));
  const frameCount = Math.max(1, endSample - startSample);
  const channels = [];

  for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
    channels.push(buffer.getChannelData(channel).slice(startSample, endSample));
  }

  return buildAudioBufferFromChannels(channels, sampleRate);
}

function refreshPreviewFromBlob(blob) {
  if (previewUrl) {
    URL.revokeObjectURL(previewUrl);
  }
  previewUrl = URL.createObjectURL(blob);
  previewPlayer.src = previewUrl;
  previewPlayer.load();
}

function updateTimer() {
  const t = Math.floor((Date.now() - startTime) / 1000);
  timeEl.textContent =
    String(Math.floor(t / 60)).padStart(2,"0") + ":" +
    String(t % 60).padStart(2,"0");
}

async function requestRecordingStream() {
  let captureError = null;

  if (window.isSecureContext && navigator.mediaDevices?.getDisplayMedia) {
    try {
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true
      });
      if (stream.getAudioTracks().length) {
        setStatus("System audio capture ready.");
        return stream;
      }
      stream.getTracks().forEach(track => track.stop());
      captureError = new Error("No system audio track was shared.");
    } catch (error) {
      captureError = error;
    }
  }

  if (window.isSecureContext && navigator.mediaDevices?.getUserMedia) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: true,
        video: false
      });
      setStatus("System audio was unavailable. Microphone capture fallback enabled.");
      return stream;
    } catch (fallbackError) {
      if (!captureError) {
        captureError = fallbackError;
      }
    }
  }

  throw captureError || new Error("No supported audio capture method is available.");
}

startBtn.onclick = async () => {
  if (typeof MediaRecorder === "undefined" || !navigator.mediaDevices) {
    showBlockedStartMessage();
    return;
  }

  audioChunks = [];
  lastWavBlob = null;
  recordedBuffer = null;
  setIdleDownloads();
  setClipControlsEnabled(false);
  timeEl.textContent = "00:00";
  setStatus("");
  updateClipMeta(0);
  if (previewUrl) {
    URL.revokeObjectURL(previewUrl);
    previewUrl = null;
  }
  previewPlayer.removeAttribute("src");
  previewPlayer.load();

  try {
    displayStream = await requestRecordingStream();
  } catch (error) {
    resetRecordingUi();
    setStatus(error && error.message ? error.message : "Audio capture was blocked.");
    return;
  }

  const audioTracks = displayStream.getAudioTracks();
  if (!audioTracks.length) {
    stopCapturedStream();
    resetRecordingUi();
    setStatus("No system audio track was shared. In the browser picker, choose a tab or screen and enable Share audio.");
    return;
  }

  audioTracks[0].addEventListener("ended", () => {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      mediaRecorder.stop();
      setStatus("Screen share ended. Finalizing recording...");
      return;
    }
    resetRecordingUi();
    setStatus("Screen share ended.");
  });

  audioCtx = new AudioContext();
  await audioCtx.resume();

  const source = audioCtx.createMediaStreamSource(displayStream);

  compressor = audioCtx.createDynamicsCompressor();
  lowEQ = audioCtx.createBiquadFilter();
  midEQ = audioCtx.createBiquadFilter();
  highEQ = audioCtx.createBiquadFilter();

  lowEQ.type = "lowshelf";
  lowEQ.frequency.value = 120;

  midEQ.type = "peaking";
  midEQ.frequency.value = 1200;
  midEQ.Q.value = 1;

  highEQ.type = "highshelf";
  highEQ.frequency.value = 6000;

  // APPLY INITIAL UI VALUES
  lowEQ.gain.value  = +lowGain.value;
  midEQ.gain.value  = +midGain.value;
  highEQ.gain.value = +highGain.value;

  compressor.threshold.value = +threshold.value;
  compressor.ratio.value     = +ratio.value;
  compressor.attack.value    = +attack.value;
  compressor.release.value   = +release.value;

  const destination = audioCtx.createMediaStreamDestination();

  source
    .connect(compressor)
    .connect(lowEQ)
    .connect(midEQ)
    .connect(highEQ)
    .connect(destination);

  const recorderMimeType = getRecorderMimeType();
  if (recorderMimeType === null) {
    stopCapturedStream();
    resetRecordingUi();
    setStatus("This browser does not support MediaRecorder for this page.");
    await audioCtx.close();
    return;
  }
  try {
    mediaRecorder = recorderMimeType
      ? new MediaRecorder(destination.stream, { mimeType: recorderMimeType })
      : new MediaRecorder(destination.stream);
  } catch (error) {
    stopCapturedStream();
    resetRecordingUi();
    setStatus(`Recording could not start in this browser: ${error.message || error}`);
    await audioCtx.close();
    return;
  }
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onerror = (event) => {
    resetRecordingUi();
    stopCapturedStream();
    setStatus(event.error?.message || "Recording failed.");
  };

  mediaRecorder.onstop = async () => {
    resetRecordingUi();

    try {
      if (!audioChunks.length) {
        setStatus("No audio was captured. Try again and make sure Share audio is enabled.");
        return;
      }

      const blobType = mediaRecorder.mimeType || "audio/webm";
      const webm = new Blob(audioChunks, { type: blobType });
      recordedBuffer = await audioCtx.decodeAudioData(await webm.arrayBuffer());
      lastWavBlob = audioBufferToWav(recordedBuffer);

      refreshPreviewFromBlob(lastWavBlob);
      syncClipInputs(recordedBuffer.duration);
      setClipControlsEnabled(true);
      setStatus("Recording ready. Preview it or export WAV / MP3 320.");
      setIdleDownloads();
    } catch (error) {
      setStatus(`Recording could not be processed: ${error.message || error}`);
    } finally {
      stopCapturedStream();
      audioCtx.close();
    }
  };

  mediaRecorder.start();
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 500);

  stopBtn.disabled = false;
  startBtn.disabled = true;
};

stopBtn.onclick = () => {
  if (!mediaRecorder || mediaRecorder.state !== "recording") {
    resetRecordingUi();
    return;
  }
  mediaRecorder.stop();
  stopBtn.disabled = true;
  startBtn.disabled = false;
  setStatus("Processing WAV...");
};

downloadWavBtn.onclick = () => {
  if (!lastWavBlob) return;
  const url = URL.createObjectURL(lastWavBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "system_audio.wav";
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

applyClipBtn.onclick = () => {
  if (!recordedBuffer) return;

  const duration = recordedBuffer.duration;
  const start = Math.max(0, Math.min(duration, parseFloat(clipStartInput.value) || 0));
  const end = Math.max(0, Math.min(duration, parseFloat(clipEndInput.value) || duration));

  if (end <= start) {
    setStatus("Clip end must be greater than clip start.");
    return;
  }

  const clippedBuffer = createTrimmedBuffer(recordedBuffer, start, end);
  recordedBuffer = clippedBuffer;
  lastWavBlob = audioBufferToWav(recordedBuffer);
  refreshPreviewFromBlob(lastWavBlob);
  syncClipInputs(recordedBuffer.duration);
  setIdleDownloads();
  setStatus(`Clip cut applied: ${start.toFixed(2)}s to ${end.toFixed(2)}s.`);
};

async function getFfmpeg() {
  if (!window.FFmpeg || !window.FFmpeg.createFFmpeg) {
    throw new Error("FFmpeg library not available");
  }

  if (!ffmpegInstance) {
    const { createFFmpeg } = window.FFmpeg;
    ffmpegInstance = createFFmpeg({
      log: false,
      corePath: "vendor/ffmpeg/ffmpeg-core.js",
      wasmPath: "vendor/ffmpeg/ffmpeg-core.wasm",
      workerPath: "vendor/ffmpeg/ffmpeg-core.worker.js"
    });
  }

  if (ffmpegInstance.isLoaded()) {
    return ffmpegInstance;
  }

  if (!ffmpegLoadPromise) {
    ffmpegLoadPromise = ffmpegInstance.load().catch((error) => {
      ffmpegLoadPromise = null;
      ffmpegInstance = null;
      ffmpegReady = false;
      throw error;
    });
  }

  await ffmpegLoadPromise;

  if (!ffmpegInstance || !ffmpegInstance.isLoaded()) {
    ffmpegLoadPromise = null;
    ffmpegReady = false;
    throw new Error("FFmpeg core did not finish loading.");
  }

  ffmpegReady = true;
  return ffmpegInstance;
}

async function warmupFfmpeg() {
  if (location.protocol === "file:") {
    ffmpegReady = false;
    setIdleDownloads();
    return;
  }

  try {
    setStatus("Loading MP3 engine...");
    await getFfmpeg();
    setStatus("MP3 engine ready.");
  } catch (error) {
    ffmpegReady = false;
    setStatus(`MP3 engine load failed: ${error.message || error}`);
  } finally {
    setIdleDownloads();
  }
}

function getLocalhostPageUrl() {
  const path = location.pathname.split("/").pop() || "";
  return appBase + encodeURI(path);
}

function getServerStartHint() {
  return 'Start the local server with Docker and open this page from the local app URL.';
}

downloadMp3Btn.onclick = async () => {
  if (!lastWavBlob) return;
  downloadMp3Btn.disabled = true;
  setStatus("Encoding MP3 320 kbps...");

  try {
    if (location.protocol === "file:") {
      const localUrl = getLocalhostPageUrl();
      setStatusHtml(
        `MP3 export needs HTTP. If that page is not found, the Flask server is not running yet. Open <a class="hint-link" href="${localUrl}" target="_blank" rel="noopener">${localUrl}</a> after you start it. ${getServerStartHint()}`
      );
      return;
    }

    const ffmpeg = await getFfmpeg();
    if (!ffmpegReady || !ffmpeg.isLoaded()) {
      throw new Error("MP3 engine is still loading. Wait a moment and try again.");
    }
    const { fetchFile } = window.FFmpeg;
    ffmpeg.FS("writeFile", "input.wav", await fetchFile(lastWavBlob));
    await ffmpeg.run(
      "-i", "input.wav",
      "-codec:a", "libmp3lame",
      "-b:a", "320k",
      "output.mp3"
    );
    const data = ffmpeg.FS("readFile", "output.mp3");
    const mp3Blob = new Blob([data.buffer], { type: "audio/mpeg" });
    const url = URL.createObjectURL(mp3Blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "system_audio_320.mp3";
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    try { ffmpeg.FS("unlink", "input.wav"); } catch (_e) {}
    try { ffmpeg.FS("unlink", "output.mp3"); } catch (_e) {}
    setStatus("MP3 320 export complete.");
  } catch (err) {
    setStatus(err.message || "MP3 export failed.");
  } finally {
    setIdleDownloads();
  }
};

// LIVE UI
lowGain.oninput  = e => lowEQ  && (lowEQ.gain.value = e.target.value);
midGain.oninput  = e => midEQ  && (midEQ.gain.value = e.target.value);
highGain.oninput = e => highEQ && (highEQ.gain.value = e.target.value);

threshold.oninput = e => compressor && (compressor.threshold.value = e.target.value);
ratio.oninput     = e => compressor && (compressor.ratio.value = e.target.value);
attack.oninput    = e => compressor && (compressor.attack.value = e.target.value);
release.oninput   = e => compressor && (compressor.release.value = e.target.value);

warmupFfmpeg();

if (typeof MediaRecorder === "undefined" || !navigator.mediaDevices) {
  showBlockedStartMessage();
}

// WAV ENCODER
function audioBufferToWav(buffer) {
  const c = buffer.numberOfChannels;
  const s = buffer.sampleRate;
  let samples = c === 2
    ? interleave(buffer.getChannelData(0), buffer.getChannelData(1))
    : buffer.getChannelData(0);
  return new Blob([encodeWAV(samples, s, c, 16)], { type: "audio/wav" });
}

function interleave(l, r) {
  const out = new Float32Array(l.length * 2);
  for (let i = 0, j = 0; i < l.length; i++) {
    out[j++] = l[i];
    out[j++] = r[i];
  }
  return out;
}

function encodeWAV(samples, rate, ch, depth) {
  const b = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(b);
  write(v,0,"RIFF");
  v.setUint32(4,36 + samples.length*2,true);
  write(v,8,"WAVEfmt ");
  v.setUint32(16,16,true);
  v.setUint16(20,1,true);
  v.setUint16(22,ch,true);
  v.setUint32(24,rate,true);
  v.setUint32(28,rate*ch*2,true);
  v.setUint16(32,ch*2,true);
  v.setUint16(34,depth,true);
  write(v,36,"data");
  v.setUint32(40,samples.length*2,true);
  floatPCM(v,44,samples);
  return b;
}

function floatPCM(v,o,s) {
  for (let i=0;i<s.length;i++,o+=2) {
    let x=Math.max(-1,Math.min(1,s[i]));
    v.setInt16(o,x<0?x*0x8000:x*0x7fff,true);
  }
}
function write(v,o,t){for(let i=0;i<t.length;i++)v.setUint8(o+i,t.charCodeAt(i));}
