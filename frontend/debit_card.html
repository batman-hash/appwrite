<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERGHOST - DEBIT CARD PAYMENT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      color: #e6e6e6;
      min-height: 100vh;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      background: rgba(0, 0, 0, 0.85);
      border-bottom: 1px solid rgba(0, 255, 255, 0.25);
      z-index: 1000;
    }
    nav a {
      color: #0ff;
      text-decoration: none;
      font-size: 0.86em;
      letter-spacing: 2px;
    }
    nav a.active {
      color: #f0f;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }
    header {
      text-align: center;
      padding: 130px 20px 24px;
    }
    h1 {
      font-size: 2.2em;
      background: linear-gradient(135deg, #f0f 0%, #0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: 10px;
      color: #888;
      font-size: 0.84em;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .wrap {
      width: min(1100px, 92%);
      margin: 0 auto 50px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(18, 18, 30, 0.92) 0%, rgba(8, 8, 16, 0.98) 100%);
      border: 1px solid rgba(0, 255, 255, 0.24);
      border-radius: 14px;
      padding: 22px;
    }
    .panel h2 {
      color: #0ff;
      font-size: 1em;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 0.72em;
      color: #9ad4d9;
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .field input, .field select {
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(0, 255, 255, 0.28);
      border-radius: 9px;
      color: #fff;
      padding: 10px;
      font-family: inherit;
      font-size: 0.78em;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      border: 1px solid rgba(0, 255, 255, 0.45);
      color: #0ff;
      background: transparent;
      border-radius: 10px;
      padding: 11px 14px;
      font-family: inherit;
      font-size: 0.78em;
      letter-spacing: 1px;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover {
      color: #f0f;
      border-color: rgba(255, 0, 255, 0.5);
      box-shadow: 0 0 16px rgba(255, 0, 255, 0.25);
    }
    .summary-item, .info-box, .result {
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 10px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.35);
      font-size: 0.78em;
      color: #a6e9ef;
      line-height: 1.55;
      margin-bottom: 10px;
    }
    .summary-item strong { color: #fff; display: block; margin-bottom: 4px; }
    .check-line {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 12px 0;
      font-size: 0.76em;
      color: #cdeff2;
    }
    .check-line input { accent-color: #0ff; }
    .note {
      margin-top: 12px;
      font-size: 0.72em;
      color: #888;
      line-height: 1.45;
    }
    .result { display: none; margin-top: 12px; }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      nav { flex-wrap: wrap; gap: 12px; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">HOME</a>
    <a href="Posterwall.html">POSTERWALL</a>
    <a href="shop.html" class="active">SHOP</a>
    <a href="shop_cart.html">CART</a>
    <a href="contact.html">CONTACT</a>
  </nav>

  <header>
    <h1>DEBIT CARD PAYMENT</h1>
    <p>Card checkout with local verification, card labels, and bank transfer details</p>
  </header>

  <main class="wrap">
    <section class="panel">
      <h2>// ORDER SUMMARY</h2>
      <div id="orderSummary"></div>
      <div id="orderTotals" class="info-box"></div>
      <p class="note">This local page records card and transfer reference details in the backend. It does not contact a bank or processor.</p>
    </section>

    <section class="panel">
      <h2>// CARD DETAILS</h2>
      <form id="cardForm">
        <div class="field">
          <label for="cardName">Cardholder Name</label>
          <input id="cardName" type="text" placeholder="Name on card" required>
        </div>
        <div class="field">
          <label for="cardNumber">Card Number</label>
          <input id="cardNumber" type="text" inputmode="numeric" placeholder="1234 5678 9012 3456" required>
        </div>
        <div class="row">
          <div class="field">
            <label for="expiry">Expiration Date</label>
            <input id="expiry" type="text" placeholder="MM/YY" required>
          </div>
          <div class="field">
            <label for="cvv">CVV</label>
            <input id="cvv" type="password" inputmode="numeric" placeholder="123" required>
          </div>
        </div>
        <div class="field">
          <label for="cardLabel">Card Label</label>
          <input id="cardLabel" type="text" placeholder="Personal debit / business card alias">
        </div>
        <div class="field">
          <label for="iban">IBAN</label>
          <input id="iban" type="text" placeholder="IT60X0542811101000000123456">
        </div>
        <div class="row">
          <div class="field">
            <label for="bankName">Bank Name</label>
            <input id="bankName" type="text" placeholder="Bank or issuer name">
          </div>
          <div class="field">
            <label for="accountHolder">Bank Account Holder</label>
            <input id="accountHolder" type="text" placeholder="Beneficiary full name">
          </div>
        </div>
        <div class="field">
          <label for="transferReference">Bank Transfer Reference</label>
          <input id="transferReference" type="text" placeholder="Transfer note or statement reference">
        </div>
        <div class="field">
          <label for="verifyMethod">Verification Route</label>
          <select id="verifyMethod" required>
            <option value="phone">Phone Verification</option>
            <option value="email">Email Verification</option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label for="verifyTarget">Phone or Email</label>
            <input id="verifyTarget" type="text" placeholder="+39... or you@example.com" required>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="btn" id="sendCodeBtn" type="button">SEND CODE</button>
          </div>
        </div>
        <div class="field">
          <label for="verifyCode">Security Code</label>
          <input id="verifyCode" type="text" placeholder="Enter local code" required>
        </div>
        <div class="field">
          <label for="robotAnswer">Anti-Robot Check: type HUMAN</label>
          <input id="robotAnswer" type="text" placeholder="HUMAN" required>
        </div>
        <label class="check-line">
          <input id="robotCheck" type="checkbox" required>
          <span>I confirm I am not a robot and authorize this local card checkout flow.</span>
        </label>
        <button class="btn" type="submit">PROCESS CARD PAYMENT</button>
      </form>
      <div id="result" class="result"></div>
    </section>
  </main>

  <script>
    const CHECKOUT_KEY = "cyberghost_checkout_cart_v1";
    const CHECKOUT_ORDER_KEY = "cyberghost_checkout_order_v1";
    const CARD_KEY = "cyberghost_card_checkout_v1";
    const API_BASE = `${window.location.origin}/api`;
    const orderSummary = document.getElementById("orderSummary");
    const orderTotals = document.getElementById("orderTotals");
    const cardForm = document.getElementById("cardForm");
    const sendCodeBtn = document.getElementById("sendCodeBtn");
    const result = document.getElementById("result");
    const params = new URLSearchParams(window.location.search);
    const orderCode = params.get("order") || "";
    const providerPaymentId = params.get("payment_id") || "";
    let generatedCode = "";

    function getCheckoutCart() {
      try {
        return JSON.parse(localStorage.getItem(CHECKOUT_KEY) || "[]");
      } catch (_) {
        return [];
      }
    }

    function saveCheckoutOrder(order) {
      localStorage.setItem(CHECKOUT_ORDER_KEY, JSON.stringify(order));
    }

    function money(n) {
      return "$" + Number(n || 0).toFixed(2);
    }

    async function loadBackendOrder() {
      if (!orderCode) return null;
      try {
        const res = await fetch(`${API_BASE}/orders/${encodeURIComponent(orderCode)}`);
        const data = await res.json();
        if (res.ok && data.success) {
          saveCheckoutOrder(data.order);
          localStorage.setItem(CHECKOUT_KEY, JSON.stringify(data.items.map((item) => ({
            id: item.product_id,
            name: item.product_name,
            price: item.unit_price,
            qty: item.quantity
          }))));
          return data;
        }
      } catch (_) {}
      return null;
    }

    function renderOrder(cart = getCheckoutCart()) {
      if (!cart.length) {
        orderSummary.innerHTML = '<div class="info-box">No checkout cart found. Return to CART and choose a payment method.</div>';
        orderTotals.textContent = "Items: 0 | Total: $0.00";
        return;
      }
      orderSummary.innerHTML = cart.map((item) => `
        <div class="summary-item">
          <strong>${item.name}</strong>
          Qty: ${Number(item.qty || 0)} | Price each: ${money(item.price)} | Line total: ${money(Number(item.qty || 0) * Number(item.price || 0))}
        </div>
      `).join("");
      const items = cart.reduce((a, i) => a + Number(i.qty || 0), 0);
      const total = cart.reduce((a, i) => a + Number(i.qty || 0) * Number(i.price || 0), 0);
      orderTotals.textContent = `Items: ${items} | Total: ${money(total)}`;
    }

    sendCodeBtn.addEventListener("click", () => {
      const target = document.getElementById("verifyTarget").value.trim();
      if (!target) return;
      generatedCode = String(Math.floor(100000 + Math.random() * 900000));
      alert(`Local verification code sent to ${target}: ${generatedCode}`);
    });

    cardForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const code = document.getElementById("verifyCode").value.trim();
      const robotAnswer = document.getElementById("robotAnswer").value.trim().toUpperCase();
      const digits = document.getElementById("cardNumber").value.replace(/\s+/g, "");
      if (!/^\d{13,19}$/.test(digits)) {
        alert("Enter a valid card number format.");
        return;
      }
      if (!generatedCode || code !== generatedCode) {
        alert("Verification code mismatch.");
        return;
      }
      if (robotAnswer !== "HUMAN" || !document.getElementById("robotCheck").checked) {
        alert("Security check failed.");
        return;
      }
      const payload = {
        cardName: document.getElementById("cardName").value.trim(),
        cardLabel: document.getElementById("cardLabel").value.trim(),
        last4: digits.slice(-4),
        expiry: document.getElementById("expiry").value.trim(),
        iban: document.getElementById("iban").value.trim(),
        bankName: document.getElementById("bankName").value.trim(),
        accountHolder: document.getElementById("accountHolder").value.trim(),
        transferReference: document.getElementById("transferReference").value.trim(),
        verifyMethod: document.getElementById("verifyMethod").value,
        verifyTarget: document.getElementById("verifyTarget").value.trim(),
        cart: getCheckoutCart(),
        createdAt: new Date().toISOString()
      };
      try {
        if (orderCode) {
          const res = await fetch(`${API_BASE}/payments/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              order_code: orderCode,
              provider: "card",
              provider_payment_id: providerPaymentId,
              details: payload
            })
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.error || "Could not save card payment details.");
          }
        }
      } catch (err) {
        alert(err.message || "Could not save card payment details.");
        return;
      }
      result.style.display = "block";
      result.textContent = `Debit card payment stored in backend for card ending ${payload.last4}. IBAN ${payload.iban || "n/a"} and transfer reference ${payload.transferReference || "n/a"} were recorded for order ${orderCode || "N/A"}.`;
      cardForm.reset();
      generatedCode = "";
    });

    (async () => {
      const backendOrder = await loadBackendOrder();
      if (backendOrder && backendOrder.items) {
        renderOrder(backendOrder.items.map((item) => ({
          name: item.product_name,
          price: item.unit_price,
          qty: item.quantity
        })));
      } else {
        renderOrder();
      }
    })();
  </script>
</body>
</html>
