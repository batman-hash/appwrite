<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBERGHOST — Track Transmission</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #05000a, #000);
      color: #e6e6e6;
      min-height: 100vh;
    }

    /* ================= NAV ================= */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      padding: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      gap: 30px;
      border-bottom: 1px solid #0ff3;
    }

    nav a {
      color: #0ff;
      text-decoration: none;
      font-size: 0.9em;
      text-shadow: 0 0 5px #0ff;
      transition: 0.3s;
    }

    nav a:hover {
      color: #f0f;
      text-shadow: 0 0 10px #f0f;
    }

    /* ================= HEADER ================= */
    header {
      text-align: center;
      padding: 140px 20px 40px;
    }

    h1 {
      font-size: 3.5em;
      background: linear-gradient(90deg, #f0f, #0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.8em;
      color: #888;
      margin-top: 10px;
    }

    /* ================= TRACKLIST ================= */
    .track-container {
      max-width: 700px;
      margin: 40px auto 100px;
      padding: 30px;
      background: rgba(15,15,25,0.7);
      border: 1px solid #0ff4;
      border-radius: 20px;
      box-shadow: 0 0 40px #0ff2;
    }

    .track {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 10px;
      border-bottom: 1px solid #0ff2;
      transition: 0.3s;
    }

    .track:last-child {
      border-bottom: none;
    }

    .track:hover {
      background: rgba(0,255,255,0.05);
    }

    .track-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .track-title {
      font-size: 0.9em;
      color: #0ff;
    }

    .track-sub {
      font-size: 0.65em;
      color: #777;
    }

    .track button {
      background: transparent;
      border: 1px solid #f0f;
      color: #f0f;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.65em;
      cursor: pointer;
      transition: 0.3s;
    }

    .track button:hover {
      background: #f0f;
      color: #000;
      box-shadow: 0 0 15px #f0f;
    }

    /* ================= PLAYER ================= */
    .player {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #0ff3;
      text-align: center;
    }

    .now-playing {
      font-size: 0.7em;
      color: #0ff;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    audio {
      width: 100%;
      filter: hue-rotate(150deg) brightness(1.5);
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #444;
      font-size: 0.7em;
    }
  
  /* === RESPONSIVE PATCH === */
  img, video, canvas {
    max-width: 100%;
    height: auto;
  }

  nav {
    flex-wrap: wrap;
  }

  @media (max-width: 1024px) {
    nav {
      gap: 14px !important;
      padding: 14px !important;
    }

    header {
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    .wrap,
    .container,
    .contact-container,
    .poster-grid-container,
    .chat-section,
    .auth-window,
    .player,
    .panel {
      width: min(100%, 980px) !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }
  }

  @media (max-width: 768px) {
    html, body {
      font-size: 15px;
    }

    nav {
      justify-content: center !important;
      row-gap: 10px !important;
      column-gap: 10px !important;
      padding: 10px 8px !important;
    }

    nav a,
    nav button {
      font-size: 0.78rem !important;
      padding: 8px 10px !important;
    }

    header {
      margin-top: 82px !important;
      padding: 0 12px !important;
      text-align: center !important;
    }

    h1 {
      font-size: clamp(1.3rem, 6vw, 2rem) !important;
      line-height: 1.2;
    }

    h2 {
      font-size: clamp(1rem, 5vw, 1.5rem) !important;
    }

    .auth-window,
    .contact-form-wrapper,
    .chat-section,
    .card,
    .player,
    .panel {
      width: calc(100% - 20px) !important;
      max-width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
      padding: 12px !important;
    }

    .poster-grid,
    .events-grid,
    .cards-grid,
    .topics-grid,
    .playlist-grid,
    .shop-grid,
    .panel {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }

    .chat-messages {
      height: 46vh !important;
      min-height: 260px;
      max-height: 58vh;
    }

    .chat-input-area,
    .row {
      flex-wrap: wrap !important;
    }

    .chat-input-area input,
    .chat-input-area button,
    input,
    select,
    textarea,
    button {
      width: 100%;
      max-width: 100%;
    }
  }

  @media (max-width: 420px) {
    html, body {
      font-size: 14px;
    }

    nav a,
    nav button {
      font-size: 0.72rem !important;
      letter-spacing: 0.04em !important;
    }

    .chat-messages {
      height: 44vh !important;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html">HOME</a>
  <a href="Posterwall.html">POSTERWALL</a>
  <a href="shop.html">SHOP</a>
  <a href="room.html">THE ROOM</a>
  <a href="contact.html">CONTACT</a>
</nav>

<header>
  <h1>TRACK TRANSMISSION</h1>
  <p>Post-Romantic Circuits — Signal Archive</p>
</header>

<section class="track-container">

  <div class="track">
    <div class="track-info">
      <div class="track-title">01 — Neon Afterimage</div>
      <div class="track-sub">4:12 // SYNTH WAVEFORM</div>
    </div>
    <button onclick="playTrack('assets/audio/track1.mp3', 'Neon Afterimage')">PLAY</button>
  </div>

  <div class="track">
    <div class="track-info">
      <div class="track-title">02 — Ghosts in the Circuit</div>
      <div class="track-sub">3:48 // MEMORY LOOP</div>
    </div>
    <button onclick="playTrack('assets/audio/track2.mp3', 'Ghosts in the Circuit')">PLAY</button>
  </div>

  <div class="track">
    <div class="track-info">
      <div class="track-title">03 — Post-Romantic Error</div>
      <div class="track-sub">5:01 // EMOTIONAL OVERFLOW</div>
    </div>
    <button onclick="playTrack('assets/audio/track3.mp3', 'Post-Romantic Error')">PLAY</button>
  </div>

  <div class="player">
    <div class="now-playing" id="nowPlaying">NO SIGNAL SELECTED</div>
    <audio id="audioPlayer" controls></audio>
  </div>

</section>
<script src="js/auth.js"></script>
<script>
  const audioPlayer = document.getElementById('audioPlayer');
  const nowPlaying = document.getElementById('nowPlaying');

  function playTrack(src, title) {
    audioPlayer.src = src;
    audioPlayer.play();
    nowPlaying.textContent = 'NOW PLAYING: ' + title;
  }
</script>

</body>
<footer>
  © 2026 CYBERGHOST // SIGNAL CONTINUES
</footer>
</html>
